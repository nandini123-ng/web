<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*here some transition function used in CSS when we click on the box it will shows the changes*/
        div{
            height:500px;
            width:500px;
            background-color: deeppink;
            color:white;
            transition-property:all;
            transition-duration:0s;
            transition-timing-function: ease-in-out;
            transition-delay:0s;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        div:hover{
            width:800px;
        }
       div{
            width:300px;
      }
    </style>
</head>
<body>
   <div>
   <h1> CLICK ME😊</h1>
   9+

   </div> 
</body>
</html>
