<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
</head>
<body>
    <form>
     <table align="center" cellpadding="5">
    
      <fieldset>
        <tr>
          <td>
            <label for="firstname">FIRSTNAME:</label></td>
            <input type="text" id="firstname" />(max 20 char a-z and A-Z)
            </tr>
        </br><br/>
        <tr>
          <td>

    </br><br/>
        <label for="dob">DOB</label>
        <input type="date" id="dob">
     </br></br>
      <label for="gender">GENDER </label>

      </br><br/>

      <label for="state">STATE</label>

      <label for="country">COUNTRY</label>
     <input type="text" id="country">

      DANCING<input type="checkbox" name="hobbies" value="dancing"><br></br>
      OTHER<input type="checkbox"  name="hobbies" value="other"><input type ="text" id="others"><br><br/>
      <br></br>
      
      <table>
        <tr>
         <td rowspan="7">Qualification: </td>
       <td>Sl.no</td>
       <td >Examination</td>

        <td>4</td>

        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
      </tr> 
    </table>

    <br></br>
       <label for="courses applied for">COURSES APPLIED FOR: </label>  
      BCA<input type="radio" name="courses applied for" value="bca">
      B.Com<input type="radio" name="courses applied for" value="bcom">
      BSc<input type="radio" name="courses applied for" value="bsc">
      B.A<input type="radio" name="courses applied for" value="ba">
    <br></br>
    <div>
      <input type="submit" value="Submit">
      <input type="reset"  value="Reset">
    </div>

      </fieldset>  
    </table>
</body>
</html>
